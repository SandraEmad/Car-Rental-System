<mat-sidenav-container class="sidenav-container">

  <mat-sidenav mode="side" opened class="sidenav">
    <div class="logo">🚗 Car Rental</div>

    <mat-nav-list>
      <a mat-list-item routerLink="/cars" routerLinkActive="active-link">
        <mat-icon matListItemIcon>directions_car</mat-icon>
        <span>Cars</span>
      </a>
      <a mat-list-item routerLink="/orders" routerLinkActive="active-link">
        <mat-icon matListItemIcon>receipt_long</mat-icon>
        <span>My Orders</span>
      </a>
      <a mat-list-item routerLink="/installments" routerLinkActive="active-link">
        <mat-icon matListItemIcon>payments</mat-icon>
        <span>Installments</span>
      </a>
    </mat-nav-list>

    <div class="logout">
      <button mat-icon-button (click)="toggleDark()">
        <mat-icon>{{ isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
      <button mat-stroked-button color="warn" (click)="logout()">
        <mat-icon>logout</mat-icon> Logout
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <router-outlet />
  </mat-sidenav-content>

</mat-sidenav-container>

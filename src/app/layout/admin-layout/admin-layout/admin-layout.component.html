<mat-sidenav-container class="sidenav-container">
  <!-- Sidebar -->
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="logo">🚗 Car Rental</div>

    <mat-nav-list>
      <a mat-list-item routerLink="/admin/users" routerLinkActive="active-link">
        <mat-icon matListItemIcon>people</mat-icon>
        <span>Users</span>
      </a>
      <a mat-list-item routerLink="/admin/cars" routerLinkActive="active-link">
        <mat-icon matListItemIcon>directions_car</mat-icon>
        <span>Cars</span>
      </a>
      <a
        mat-list-item
        routerLink="/admin/orders"
        routerLinkActive="active-link"
      >
        <mat-icon matListItemIcon>receipt_long</mat-icon>
        <span>Orders</span>
      </a>
    </mat-nav-list>
    <div class="logout">
      <!-- Dark Mode Toggle -->
      <button mat-icon-button (click)="toggleDark()">
        <mat-icon>{{ isDark ? "light_mode" : "dark_mode" }}</mat-icon>
      </button>

      <!-- Logout -->
      <button mat-stroked-button color="warn" (click)="logout()">
        <mat-icon>logout</mat-icon> Logout
      </button>
    </div>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content class="content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
